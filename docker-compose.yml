########################################################################################
# HCS Docker Compose — Production
#
# Все сервисы используют один образ (hcs:latest).
# Роль определяется командой entrypoint: web | worker-scan | worker-sync | beat | ...
#
# Горизонтальное масштабирование: docker compose up --scale collector-scan=3
########################################################################################

services:
  postgres:
    image: postgres:16-alpine
    container_name: hcs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hcs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hcs}
      POSTGRES_DB: ${POSTGRES_DB:-hcs}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hcs}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hcs-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Web UI + API ────────────────────────────────────────────────
  web:
    image: ${HCS_IMAGE:-hcs:latest}
    container_name: hcs-web
    restart: unless-stopped
    command: ["web"]
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file: .env
    environment:
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-4}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-120}
      - REQUESTS_CA_BUNDLE=${REQUESTS_CA_BUNDLE:-}
    volumes:
      - ${HOST_CA_BUNDLE:-/etc/pki/tls/certs/ca-bundle.crt}:/etc/ssl/certs/ca-certificates.crt:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Scan Collector (scale with --scale collector-scan=N) ────────
  collector-scan:
    image: ${HCS_IMAGE:-hcs:latest}
    restart: unless-stopped
    command: ["worker-scan"]
    env_file: .env
    environment:
      - CELERY_CONCURRENCY=${SCAN_CONCURRENCY:-4}
      - REQUESTS_CA_BUNDLE=${REQUESTS_CA_BUNDLE:-}
    volumes:
      - ${HOST_CA_BUNDLE:-/etc/pki/tls/certs/ca-bundle.crt}:/etc/ssl/certs/ca-certificates.crt:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Sync Collector ──────────────────────────────────────────────
  collector-sync:
    image: ${HCS_IMAGE:-hcs:latest}
    container_name: hcs-collector-sync
    restart: unless-stopped
    command: ["worker-sync"]
    env_file: .env
    environment:
      - CELERY_CONCURRENCY=${SYNC_CONCURRENCY:-2}
      - REQUESTS_CA_BUNDLE=${REQUESTS_CA_BUNDLE:-}
    volumes:
      - ${HOST_CA_BUNDLE:-/etc/pki/tls/certs/ca-bundle.crt}:/etc/ssl/certs/ca-certificates.crt:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Beat Scheduler ─────────────────────────────────────────────
  beat:
    image: ${HCS_IMAGE:-hcs:latest}
    container_name: hcs-beat
    restart: unless-stopped
    command: ["beat"]
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  # ── Maintenance Worker ─────────────────────────────────────────
  maintenance:
    image: ${HCS_IMAGE:-hcs:latest}
    container_name: hcs-maintenance
    restart: unless-stopped
    command: ["worker-all"]
    env_file: .env
    environment:
      - CELERY_CONCURRENCY=1
      - REQUESTS_CA_BUNDLE=${REQUESTS_CA_BUNDLE:-}
    volumes:
      - ${HOST_CA_BUNDLE:-/etc/pki/tls/certs/ca-bundle.crt}:/etc/ssl/certs/ca-certificates.crt:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
