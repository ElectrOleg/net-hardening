# ═══════════════════════════════════════════════════════════════
# HCS Nginx Reverse Proxy
# ═══════════════════════════════════════════════════════════════
#
# Установка:
#   1. Скопировать в /etc/nginx/conf.d/hcs.conf
#   2. Положить SSL сертификаты (см. комментарии ниже)
#   3. nginx -t && systemctl reload nginx
#
# Если без SSL (только HTTP):
#   - Раскомментировать секцию "HTTP-only" внизу
#   - Закомментировать обе секции server (HTTP redirect + HTTPS)
# ═══════════════════════════════════════════════════════════════

# Upstream — контейнер HCS Web
upstream hcs_backend {
    server 127.0.0.1:8000;

    # Если несколько web-контейнеров (docker compose up --scale web=2):
    # server 127.0.0.1:8001;
    # server 127.0.0.1:8002;

    keepalive 16;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name hcs.example.com;

    # Let's Encrypt / ACME challenge (если используете certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hcs.example.com;

    # ── SSL ────────────────────────────────────────────────────
    # Самоподписанный:
    #   openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
    #     -keyout /etc/nginx/ssl/hcs.key \
    #     -out /etc/nginx/ssl/hcs.crt \
    #     -subj "/CN=hcs.example.com"
    #
    # Let's Encrypt:
    #   certbot certonly --nginx -d hcs.example.com
    #
    ssl_certificate     /etc/nginx/ssl/hcs.crt;
    ssl_certificate_key /etc/nginx/ssl/hcs.key;

    # Современные параметры TLS
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    # HSTS (опционально, включать когда уверены в SSL)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # ── Общие настройки ────────────────────────────────────────
    client_max_body_size 50M;  # Для CSV-импорта и API

    # Логи
    access_log /var/log/nginx/hcs_access.log;
    error_log  /var/log/nginx/hcs_error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Проксирование на HCS ───────────────────────────────────
    location / {
        proxy_pass http://hcs_backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Таймауты (сканы могут быть долгими)
        proxy_connect_timeout 10s;
        proxy_read_timeout    300s;   # 5 мин — для долгих API запросов
        proxy_send_timeout    60s;

        # WebSocket support (для будущих live-обновлений)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Статика (кэширование) ──────────────────────────────────
    location /static/ {
        proxy_pass http://hcs_backend/static/;
        proxy_cache_valid 200 1d;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Health check (без логирования) ─────────────────────────
    location = /health {
        proxy_pass http://hcs_backend/health;
        access_log off;
    }

    # ── Metrics (ограничить доступ) ────────────────────────────
    location = /metrics {
        # Только с мониторинг-серверов
        # allow 10.0.0.0/8;
        # deny all;
        proxy_pass http://hcs_backend/metrics;
        access_log off;
    }
}


